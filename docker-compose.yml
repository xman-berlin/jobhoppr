services:

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-jobhoppr}
      POSTGRES_USER:     ${POSTGRES_USER:-jobhoppr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobhoppr_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhoppr} -d ${POSTGRES_DB:-jobhoppr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB:-jobhoppr}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-jobhoppr}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-jobhoppr_secret}
      SPRING_PROFILES_ACTIVE:     ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "8080:8080"

volumes:
  pgdata:
