<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="kompetenz-eintrag"
     th:id="'pk-' + ${pk.id.kompetenzId}"
     class="flex items-center gap-2 text-sm py-1 border-b border-base-200 last:border-0">
  <span class="flex-1">
    <span class="font-medium" th:text="${kompetenzName}">Kompetenz</span>
    <span class="text-xs text-base-content/50 ml-1" th:text="${pk.niveau}">GRUNDKENNTNISSE</span>
  </span>
  <button class="btn btn-xs btn-ghost btn-circle text-error"
          th:hx-delete="@{/personen/{pid}/kompetenzen/{kid}(pid=${personId},kid=${pk.id.kompetenzId})}"
          th:attr="hx-target='#pk-' + ${pk.id.kompetenzId}"
          hx-swap="outerHTML">✕</button>
</div>
</body>
</html>
