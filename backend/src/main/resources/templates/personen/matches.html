<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="'Matches – ' + ${person.vollerName}">Matches</title></head>
<body>
<div layout:fragment="content">

  <div class="flex items-center gap-4 mb-6">
    <a th:href="@{/personen/{id}(id=${person.id})}" class="btn btn-ghost btn-sm">← Zurück</a>
    <div class="flex-1">
      <h1 class="text-2xl font-bold" th:text="'Matches für ' + ${person.vollerName}">Matches</h1>
      <p class="text-sm text-base-content/60">
        Modell: <span th:text="${modell.name}" class="font-medium">Standard</span>
        &nbsp;·&nbsp; Geo: <span th:text="${modell.geoAktiv} ? 'aktiv' : 'inaktiv'">aktiv</span>
      </p>
    </div>
    <!-- Sortier-Buttons -->
    <div class="flex items-center gap-2">
      <span class="text-xs text-base-content/50 hidden sm:inline">Sortierung:</span>
      <div class="join">
        <a th:href="@{/personen/{id}/matches(id=${person.id},sortBy='score',sortDir='desc')}"
           th:classappend="${sortBy == 'score' and sortDir == 'desc'} ? 'btn-active' : ''"
           class="join-item btn btn-xs btn-outline">Score ↓</a>
        <a th:href="@{/personen/{id}/matches(id=${person.id},sortBy='score',sortDir='asc')}"
           th:classappend="${sortBy == 'score' and sortDir == 'asc'} ? 'btn-active' : ''"
           class="join-item btn btn-xs btn-outline">Score ↑</a>
        <a th:href="@{/personen/{id}/matches(id=${person.id},sortBy='erstellt_am',sortDir='desc')}"
           th:classappend="${sortBy == 'erstellt_am' and sortDir == 'desc'} ? 'btn-active' : ''"
           class="join-item btn btn-xs btn-outline">Datum ↓</a>
        <a th:href="@{/personen/{id}/matches(id=${person.id},sortBy='erstellt_am',sortDir='asc')}"
           th:classappend="${sortBy == 'erstellt_am' and sortDir == 'asc'} ? 'btn-active' : ''"
           class="join-item btn btn-xs btn-outline">Datum ↑</a>
      </div>
    </div>
  </div>

  <div th:if="${ergebnisse.empty}" class="alert alert-info">
    <span>Keine passenden Stellen gefunden. Prüfen Sie Geo-Filter und Beruf.</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" th:unless="${ergebnisse.empty}">
    <div th:each="r : ${ergebnisse}"
         class="card bg-base-100 shadow hover:shadow-md transition-shadow">
      <div class="card-body p-4">
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1">
            <a th:href="@{/stellen/{id}(id=${r.targetId})}"
               th:text="${r.targetName}"
               class="font-semibold text-sm hover:text-primary leading-tight block">Stelle</a>
            <!-- Typ-Badge -->
            <span th:if="${r.stelleTyp != null and r.stelleTyp.name() == 'LEHRSTELLE'}"
                  class="badge badge-warning badge-xs mt-1">Lehrstelle</span>
          </div>
          <div class="radial-progress text-primary flex-shrink-0"
               th:style="'--value:' + ${r.scoreProzent()} + '; --size: 3rem; --thickness: 4px;'"
               role="progressbar">
            <span class="text-xs font-bold" th:text="${r.scoreProzent()} + '%'">0%</span>
          </div>
        </div>

        <!-- Breakdown: STANDARD -->
        <div th:if="${r.stelleTyp == null or r.stelleTyp.name() == 'STANDARD'}"
             class="mt-3 space-y-1">
          <div class="flex items-center gap-2 text-xs">
            <span class="w-20 text-base-content/60">Beruf</span>
            <progress class="progress progress-primary flex-1 h-2"
                      th:value="${r.berufScoreProzent()}" max="100"></progress>
            <span class="w-8 text-right" th:text="${r.berufScoreProzent()} + '%'">0%</span>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="w-20 text-base-content/60">Kompetenzen</span>
            <progress class="progress progress-secondary flex-1 h-2"
                      th:value="${r.kompetenzScoreProzent()}" max="100"></progress>
            <span class="w-8 text-right" th:text="${r.kompetenzScoreProzent()} + '%'">0%</span>
          </div>
        </div>

        <!-- Breakdown: LEHRSTELLE -->
        <div th:if="${r.stelleTyp != null and r.stelleTyp.name() == 'LEHRSTELLE'}"
             class="mt-3 space-y-1">
          <div class="flex items-center gap-2 text-xs">
            <span class="w-20 text-base-content/60">Lehrberuf</span>
            <progress class="progress progress-primary flex-1 h-2"
                      th:value="${r.berufScoreProzent()}" max="100"></progress>
            <span class="w-8 text-right" th:text="${r.berufScoreProzent()} + '%'">0%</span>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="w-20 text-base-content/60">Interessen</span>
            <progress class="progress progress-warning flex-1 h-2"
                      th:value="${r.interessenScoreProzent()}" max="100"></progress>
            <span class="w-8 text-right" th:text="${r.interessenScoreProzent()} + '%'">0%</span>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="w-20 text-base-content/60">Voraussetg.</span>
            <progress class="progress progress-accent flex-1 h-2"
                      th:value="${r.voraussetzungScoreProzent()}" max="100"></progress>
            <span class="w-8 text-right" th:text="${r.voraussetzungScoreProzent()} + '%'">0%</span>
          </div>
        </div>

        <div class="card-actions mt-3">
          <a th:href="@{/stellen/{id}(id=${r.targetId})}"
             class="btn btn-xs btn-outline w-full">Stelle ansehen</a>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
