<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="ort-select">
  <label class="label"><span class="label-text text-xs">Ort</span></label>
  <select id="ort-ort" class="select select-bordered select-sm"
          onchange="ortOrtChanged(this.value, this.options[this.selectedIndex].dataset.lat, this.options[this.selectedIndex].dataset.lon, this.options[this.selectedIndex].text)">
    <option value="">Ort wählen...</option>
    <th:block th:each="o : ${orte}">
      <option th:value="${o.id}"
              th:text="${o.name}"
              th:attr="data-lat=${o.lat}, data-lon=${o.lon}">Ort</option>
    </th:block>
  </select>
</div>
</body>
</html>
