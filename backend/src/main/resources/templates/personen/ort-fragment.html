<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="ort-eintrag"
     th:id="'ort-' + ${ort.id}"
     class="flex items-center gap-3 p-3 rounded-lg bg-base-200 mb-2">
  <div class="flex-1 grid grid-cols-2 sm:grid-cols-4 gap-2 text-sm">
    <div>
      <span class="badge badge-sm"
            th:classappend="${ort.ortRolle == 'WOHNORT'} ? 'badge-primary' : 'badge-secondary'"
            th:text="${ort.ortRolle}">WOHNORT</span>
      <span th:if="${ort.bundesweit}" class="badge badge-sm badge-accent ml-1">bundesweit</span>
    </div>
    <div class="font-medium" th:text="${ort.bezeichnung}">Wien</div>
    <div class="text-base-content/60" th:text="${ort.umkreisKm} + ' km Umkreis'">30 km</div>
    <div class="text-base-content/60 text-xs"
         th:text="${#numbers.formatDecimal(ort.lat,1,4)} + ', ' + ${#numbers.formatDecimal(ort.lon,1,4)}">–</div>
  </div>
  <button class="btn btn-xs btn-ghost btn-circle text-error"
          th:hx-delete="@{/personen/{pid}/orte/{oid}(pid=${personId},oid=${ort.id})}"
          th:attr="hx-target='#ort-' + ${ort.id}"
          hx-swap="outerHTML">✕</button>
</div>
</body>
</html>
