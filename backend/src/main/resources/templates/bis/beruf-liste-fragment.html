<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="liste">

  <div th:each="eintrag : ${berufeNachBereich}" class="mb-2">

    <!-- Bereich-Gruppe Header -->
    <div class="text-xs font-semibold text-base-content/50 uppercase tracking-wide px-2 py-1 bg-base-200 rounded sticky top-0">
      <span th:text="${eintrag.key}">Bereich</span>
      <span class="ml-1 font-normal normal-case" th:text="'(' + ${#lists.size(eintrag.value)} + ')'"></span>
    </div>

    <!-- Berufe in diesem Bereich -->
    <div th:each="beruf : ${eintrag.value}" class="border-b border-base-200 last:border-0">

      <!-- Beruf-Zeile -->
      <div class="flex items-center gap-1 px-2 py-1.5 hover:bg-base-200 rounded group">
        <!-- Toggle-Button für Kompetenzen -->
        <button class="btn btn-ghost btn-xs p-0 w-5 h-5 shrink-0 accordion-toggle"
                th:attr="data-target='kompetenzen-' + ${beruf.id()}"
                onclick="toggleKompetenzen(this)">
          <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
        <!-- Beruf-Name → Detail laden -->
        <a th:attr="hx-get='/bis/beruf/' + ${beruf.id()}"
           hx-target="#detail-panel"
           hx-swap="innerHTML"
           th:text="${beruf.name()}"
           class="flex-1 text-sm cursor-pointer hover:text-primary truncate">
        </a>
      </div>

      <!-- Kompetenz-Accordion (immer zugeklappt) -->
      <div th:id="'kompetenzen-' + ${beruf.id()}" class="px-7 pb-2 hidden">
        <div th:if="${not #lists.isEmpty(beruf.matchKompetenzen())}">
          <p class="text-xs text-base-content/40 mb-1">Gefundene Kompetenzen:</p>
          <div class="flex flex-wrap gap-1">
            <a th:each="k : ${beruf.matchKompetenzen()}"
               th:attr="hx-get='/bis/kompetenz/' + ${k.id()}"
               hx-target="#detail-panel"
               hx-swap="innerHTML"
               th:text="${k.name()}"
               class="badge badge-sm badge-outline cursor-pointer hover:badge-secondary whitespace-normal h-auto py-0.5 text-left">
            </a>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(beruf.matchKompetenzen())}">
          <!-- Kompetenzen werden per HTMX on-demand geladen -->
          <div th:id="'kompetenzen-inhalt-' + ${beruf.id()}"
               th:attr="hx-get='/bis/beruf/' + ${beruf.id()} + '/kompetenzen-inline',
                        hx-trigger='revealed',
                        hx-target='this',
                        hx-swap='outerHTML'">
            <span class="loading loading-spinner loading-xs text-base-content/30"></span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Mehr laden -->
  <div th:if="${hatMehr}" class="pt-2 pb-1 text-center">
    <button class="btn btn-ghost btn-sm w-full text-base-content/50"
            th:attr="hx-get='/bis/berufe-liste?page=' + ${naechsteSeite}"
            hx-target="#beruf-liste"
            hx-swap="beforeend"
            hx-on:click="this.remove()">
      Mehr laden …
    </button>
  </div>

  <!-- Keine Ergebnisse -->
  <div th:if="${#maps.isEmpty(berufeNachBereich)}">
    <p class="text-sm text-base-content/40 px-2 py-4 text-center">Keine Ergebnisse gefunden.</p>
  </div>

</div>
</body>
</html>
