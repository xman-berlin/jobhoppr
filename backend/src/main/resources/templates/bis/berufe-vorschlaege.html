<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="vorschlaege" class="absolute w-full bg-base-100 shadow-lg rounded-lg border border-base-300 mt-1 max-h-60 overflow-y-auto z-50">
  <ul class="menu menu-compact p-1">
    <li th:each="beruf : ${berufe}">
      <a class="flex flex-col items-start gap-0 py-2 cursor-pointer beruf-option"
         th:data-id="${beruf.id}"
         th:data-name="${beruf.name}">
        <span class="font-medium text-sm" th:text="${beruf.name}">Beruf</span>
        <span class="text-xs text-base-content/60" th:text="${beruf.bereich}">Bereich</span>
      </a>
    </li>
    <li th:if="${#lists.isEmpty(berufe)}">
      <span class="text-sm text-base-content/60 py-2 px-3">Keine Ergebnisse</span>
    </li>
  </ul>
  <script>
    document.querySelectorAll('.beruf-option').forEach(function(el) {
      el.addEventListener('click', function() {
        document.getElementById('beruf-id').value = this.dataset.id;
        document.getElementById('beruf-input').value = this.dataset.name;
        document.getElementById('beruf-vorschlaege').innerHTML = '';
      });
    });
  </script>
</div>
</body>
</html>
