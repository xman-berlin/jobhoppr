<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="kompetenz-eintrag"
     th:id="'sk-' + ${sk.id.kompetenzId}"
     class="flex items-center gap-2 text-sm py-1 border-b border-base-200 last:border-0">
  <span class="badge badge-sm"
        th:classappend="${sk.pflicht} ? 'badge-error' : 'badge-ghost'"
        th:text="${sk.pflicht} ? 'Pflicht' : 'Optional'">Pflicht</span>
  <span class="flex-1 font-medium" th:text="${kompetenzName}">Kompetenz</span>
  <button class="btn btn-xs btn-ghost btn-circle text-error"
          th:hx-delete="@{/stellen/{sid}/kompetenzen/{kid}(sid=${stelleId},kid=${sk.id.kompetenzId})}"
          th:attr="hx-target='#sk-' + ${sk.id.kompetenzId}"
          hx-swap="outerHTML">✕</button>
</div>
</body>
</html>
