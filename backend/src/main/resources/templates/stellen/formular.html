<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${isNeu} ? 'Neue Stelle' : 'Stelle bearbeiten'">Stelle</title></head>
<body>
<div layout:fragment="content">

  <div class="flex items-center gap-4 mb-6">
    <a href="/stellen" class="btn btn-ghost btn-sm">← Zurück</a>
    <h1 class="text-2xl font-bold"
        th:text="${isNeu} ? 'Neue Stelle anlegen' : 'Stelle bearbeiten'">Stelle</h1>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <div class="lg:col-span-2 card bg-base-100 shadow">
      <div class="card-body">
        <h2 class="card-title text-lg mb-4">Stammdaten</h2>
        <form th:action="${isNeu} ? '/stellen' : '/stellen/' + stelle.id"
              method="post">

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-control sm:col-span-2">
              <label class="label"><span class="label-text font-medium">Titel *</span></label>
              <input type="text" name="titel" class="input input-bordered"
                     th:value="${stelle.titel}" required/>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text font-medium">Unternehmen</span></label>
              <input type="text" name="unternehmen" class="input input-bordered"
                     th:value="${stelle.unternehmen}" placeholder="GmbH / AG"/>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text font-medium">Ort *</span></label>
              <input type="text" name="ortBezeichnung" class="input input-bordered"
                     th:value="${stelle.ortBezeichnung}" required placeholder="Wien, 1010"/>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text font-medium">Breitengrad (lat) *</span></label>
              <input type="number" step="0.0001" name="ortLat" class="input input-bordered"
                     th:value="${stelle.ortLat != null} ? ${stelle.ortLat} : 48.2082" required/>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text font-medium">Längengrad (lon) *</span></label>
              <input type="number" step="0.0001" name="ortLon" class="input input-bordered"
                     th:value="${stelle.ortLon != null} ? ${stelle.ortLon} : 16.3738" required/>
            </div>
            <div class="form-control sm:col-span-2">
              <label class="label"><span class="label-text font-medium">Beruf (BIS)</span></label>
              <input type="hidden" id="beruf-id" name="berufId" th:value="${stelle.berufId}"/>
              <input type="text" id="beruf-input" class="input input-bordered"
                     placeholder="Beruf suchen..."
                     hx-get="/api/bis/berufe/suche"
                     hx-trigger="keyup changed delay:300ms"
                     hx-target="#beruf-vorschlaege"
                     name="_beruf_suche"
                     autocomplete="off"/>
              <div id="beruf-vorschlaege" class="relative z-10"></div>
            </div>
            <div class="form-control sm:col-span-2">
              <label class="label"><span class="label-text font-medium">Beschreibung</span></label>
              <textarea name="beschreibung" class="textarea textarea-bordered" rows="3"
                        th:text="${stelle.beschreibung}" placeholder="Stellenbeschreibung..."></textarea>
            </div>
          </div>

          <div class="card-actions justify-end mt-6">
            <a href="/stellen" class="btn btn-ghost">Abbrechen</a>
            <button type="submit" class="btn btn-secondary">
              <span th:text="${isNeu} ? 'Anlegen' : 'Speichern'">Speichern</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="flex flex-col gap-4" th:if="${!isNeu}">
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="card-title text-base">Matching</h2>
          <a th:href="@{/stellen/{id}/matches(id=${stelle.id})}"
             class="btn btn-accent btn-sm w-full">Matches anzeigen</a>
        </div>
      </div>

      <!-- Kompetenzen list -->
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="card-title text-base">Kompetenzen</h2>
          <div th:if="${stelle.kompetenzen.empty}" class="text-sm text-base-content/50">Keine Kompetenzen.</div>
          <div th:each="sk : ${stelle.kompetenzen}"
               class="flex items-center gap-2 text-sm py-1 border-b border-base-200 last:border-0">
            <span class="badge badge-sm"
                  th:classappend="${sk.pflicht} ? 'badge-error' : 'badge-ghost'"
                  th:text="${sk.pflicht} ? 'Pflicht' : 'Optional'">Pflicht</span>
            <span th:text="${sk.id.kompetenzId}">–</span>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow border border-error/20">
        <div class="card-body">
          <h2 class="card-title text-base text-error">Gefahrenzone</h2>
          <button class="btn btn-error btn-outline btn-sm w-full"
                  hx-delete="${'/stellen/' + stelle.id}"
                  hx-confirm="Stelle wirklich löschen?"
                  hx-push-url="/stellen">Löschen</button>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
