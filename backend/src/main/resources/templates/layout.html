<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title layout:title-pattern="$CONTENT_TITLE | JobHoppr">JobHoppr</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js" defer></script>
</head>
<body class="min-h-screen bg-base-200" data-theme="corporate">

<!-- Navbar -->
<div class="navbar bg-base-100 shadow-md">
  <div class="navbar-start">
    <a href="/" class="btn btn-ghost text-xl font-bold text-primary">JobHoppr</a>
  </div>
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1">
<li><a href="/personen" class="font-medium"
              th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/personen')} ? 'active' : ''">Personen</a></li>
      <li><a href="/stellen" class="font-medium"
              th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/stellen')} ? 'active' : ''">Stellen</a></li>
      <li><a href="/match-modell" class="font-medium"
              th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/match-modell')} ? 'active' : ''">Match-Modell</a></li>
    </ul>
  </div>
  <div class="navbar-end">
    <div class="dropdown dropdown-end lg:hidden">
      <div tabindex="0" role="button" class="btn btn-ghost">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"/>
        </svg>
      </div>
      <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
        <li><a href="/personen"
               th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/personen')} ? 'active' : ''">Personen</a></li>
        <li><a href="/stellen"
               th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/stellen')} ? 'active' : ''">Stellen</a></li>
        <li><a href="/match-modell"
               th:classappend="${currentUri != null && #strings.startsWith(currentUri, '/match-modell')} ? 'active' : ''">Match-Modell</a></li>
      </ul>
    </div>
  </div>
</div>

<!-- Main content -->
<main class="container mx-auto px-4 py-8 max-w-7xl">
  <div layout:fragment="content"><!-- page content goes here --></div>
</main>

<!-- Toast notification -->
<div id="toast-container" class="toast toast-top toast-end z-50"></div>

<script>
  // HTMX showToast event handler
  document.body.addEventListener("showToast", function(evt) {
    const msg = evt.detail.value ?? evt.detail;
    const toast = document.getElementById("toast-container");
    const alert = document.createElement("div");
    alert.className = "alert alert-success shadow-lg";
    alert.innerHTML = `<span>${msg}</span>`;
    toast.appendChild(alert);
    setTimeout(() => alert.remove(), 3000);
  });
</script>
</body>
</html>
